<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveGang Checker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" role="navigation" aria-label="Navigatie">
      <div class="sidebar-logo">
        <div class="logo-title">⚡ LiveGang</div>
        <div class="logo-sub">Pre-launch checker</div>
      </div>

      <button class="tab-btn active" data-tab="headings" aria-selected="true">
        <span class="tab-icon">📋</span>
        H-Structuur
      </button>
      <button class="tab-btn" data-tab="wcag" aria-selected="false">
        <span class="tab-icon">♿</span>
        WCAG
      </button>
      <button class="tab-btn" data-tab="links" aria-selected="false">
        <span class="tab-icon">🔗</span>
        Link Checker
      </button>
      <button class="tab-btn" data-tab="meta" aria-selected="false">
        <span class="tab-icon">🔍</span> Meta/SEO
      </button>

      <button class="refresh-btn" id="btn-refresh" title="Pagina opnieuw scannen">↺ Scannen</button>

      <div class="sidebar-footer">v1.0.0</div>
    </nav>

    <!-- Content Area -->
    <main class="content" role="main">

      <!-- Tab: H-Structuur -->
      <section class="tab-panel active" id="panel-headings" role="tabpanel" aria-label="H-Structuur">
        <div class="loading" id="headings-loading">
          <div class="spinner"></div>
          <span>Pagina analyseren…</span>
        </div>
        <div id="headings-content" style="display:none"></div>
      </section>

      <!-- Tab: WCAG -->
      <section class="tab-panel" id="panel-wcag" role="tabpanel" aria-label="WCAG checks">
        <div class="loading" id="wcag-loading">
          <div class="spinner"></div>
          <span>WCAG controleren…</span>
        </div>
        <div id="wcag-content" style="display:none"></div>
      </section>

      <!-- Tab: Link Checker -->
      <section class="tab-panel" id="panel-links" role="tabpanel" aria-label="Link Checker">
        <div class="loading" id="links-loading">
          <div class="spinner"></div>
          <span>Links verzamelen…</span>
        </div>
        <div id="links-content" style="display:none"></div>
      </section>

      <!-- Tab: Meta/SEO -->
      <section class="tab-panel" id="panel-meta" role="tabpanel" aria-label="Meta / SEO">
        <div class="loading" id="meta-loading"><div class="spinner"></div><span>Meta-data ophalen…</span></div>
        <div id="meta-content" style="display:none"></div>
      </section>

    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
